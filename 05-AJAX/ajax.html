<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>AJAX</title>
	<style>
		table,		th,td
		{
			border:solid 1px;
			border-collapse:collapse;
		}
	</style>
</head>
<body>
    <h1>Asynchronous JavaScript And XML</h1>
	<div id="hello">
		Здесь будет содержимое, полученное при помощи AJAX
	</div>
	<button type="button" onclick="loadDoc()">Load</button>

	<table id="catalog">
		<!--<tr>
			<th>Title</th>
			<th>Artist</th>
			<th>Company</th>
			<th>Year</th>
		</tr>-->
	</table>

	<script>
		function loadDoc()
		{
			let request = new XMLHttpRequest();
			request.onreadystatechange = function ()
			{
				if (this.readyState == 4 && this.status == 200)
				{
					//document.getElementById("hello").innerHTML = this.responseText;
					loadXML(this);
				}
			}
			//request.open("GET", "ajax_info.txt", true);
			request.open("GET", "cd_catalog.xml", true);
			request.send();
		}
		function loadXML(xml)
		{
			let table = "<tr><th>Title</th><th>Artist</th><th>Year</th><th>Company</th></tr>";
			let catalog = xml.responseXML.getElementsByTagName("CD");
			for (let i = 0; i < catalog.length; i++)
			{
				table += "<tr><td>";
				table += catalog[i].getElementsByTagName("TITLE")[0].childNodes[0].nodeValue;
				table += "</td><td>";
				table += catalog[i].getElementsByTagName("ARTIST")[0].childNodes[0].nodeValue;
				table += "</td><td>";
				table += catalog[i].getElementsByTagName("YEAR")[0].childNodes[0].nodeValue;
				table += "</td><td>";
				table += catalog[i].getElementsByTagName("COMPANY")[0].childNodes[0].nodeValue;

				table += "</td></tr>";
			}
			document.getElementById("catalog").innerHTML = table;
		}
	</script>
</body>
</html>
